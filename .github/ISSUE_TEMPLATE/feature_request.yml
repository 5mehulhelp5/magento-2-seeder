name: Feature request
description: Suggest a new capability or improvement
title: "[feat]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Before filing, please search existing issues to see if this has been discussed.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: What are you trying to do that's hard or impossible today?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How would you like it to work? API sketch, CLI example, or YAML snippet are all welcome.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Workarounds you've tried, or other approaches you thought about.

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Links, screenshots, references to similar features in other tools.
